description: "Exam Trainer — discovery pass, model comparison"

prompts:
  - file://prompt_discover.py:get_prompt

providers:
  - id: google:gemini-2.5-flash
    label: flash-2.5-current
    config:
      generationConfig:
        temperature: 1
        thinkingConfig:
          thinkingBudget: 0

  - id: google:gemini-2.5-flash-lite
    label: flash-lite-2.5-known-bad
    config:
      generationConfig:
        temperature: 1
        thinkingConfig:
          thinkingBudget: 0

  - id: google:gemini-3.1-flash-lite
    label: flash-lite-3.1-candidate
    config:
      generationConfig:
        temperature: 1
        thinkingConfig:
          thinkingLevel: MINIMAL

tests:
  - description: "Full document — must find 'other' markers and a realistic item count"
    vars:
      markdown: file://fixtures/discover_input.txt
      min_items: 150
    assert:
      - type: python
        value: file://assertions.py:other_markers_present
      - type: python
        value: file://assertions.py:item_count_at_least
