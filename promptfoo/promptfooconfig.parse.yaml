description: "Exam Trainer — parse pass, model comparison across all section types"

prompts:
  - file://prompt_parse.py:get_prompt

providers:
  # Custom provider (not the built-in google:<model>) because
  # generationConfig — notably responseSchema — varies per section_type,
  # which a single static per-provider config can't express. See
  # gemini_schema_provider.py: it imports ../generation_config.py, the
  # exact function main.py calls, so this can never silently test
  # something other than what's actually deployed.
  # No model: pin — the provider asks generation_config.model_for() for
  # the exact model production uses for each section_type (discovery runs
  # on a stronger model than parse; see generation_config.MODELS). Pin a
  # model: here only for deliberate A/B comparison runs.
  - id: 'python:gemini_schema_provider.py'
    label: production-config

defaultTest:
  assert:
    - type: python
      value: file://assertions.py:question_pairs_exactly_three
    - type: python
      value: file://assertions.py:original_has_no_sentinel
    - type: python
      value: file://assertions.py:editions_have_content
    - type: python
      value: file://assertions.py:item_count_at_least
    - type: python
      value: file://assertions.py:item_count_exactly_when_set
    - type: python
      value: file://assertions.py:expected_question_count
    - type: python
      value: file://assertions.py:texts_not_empty
    - type: python
      value: file://assertions.py:span_texts_resolve_cleanly

tests:
  # Use markdown_path, never Promptfoo's text file:// variable loader:
  # Promptfoo trims text files and removes leading PDF form-feed characters.
  # prompt_parse.py reads these paths byte-for-byte via fixture_loader.py.
  - description: "lesen_teil1 — heaviest multi-edition variant"
    vars: { section_type: lesen_teil1, markdown_path: fixtures/lesen_teil1.txt, min_items: 2 }
  - description: "lesen_teil2 — heaviest multi-edition variant"
    vars: { section_type: lesen_teil2, markdown_path: fixtures/lesen_teil2.txt, min_items: 2 }
  - description: "lesen_teil3 — heaviest multi-edition variant"
    vars: { section_type: lesen_teil3, markdown_path: fixtures/lesen_teil3.txt, min_items: 2 }
  - description: "lesen_teil4 — heaviest multi-edition variant"
    vars: { section_type: lesen_teil4, markdown_path: fixtures/lesen_teil4.txt, min_items: 2 }
  - description: "beschwerde — heaviest multi-edition variant"
    vars: { section_type: beschwerde, markdown_path: fixtures/beschwerde.txt, min_items: 2 }
  - description: "sprachbausteine_teil1 — heaviest multi-edition variant"
    vars: { section_type: sprachbausteine_teil1, markdown_path: fixtures/sprachbausteine_teil1.txt, min_items: 2 }
  - description: "sprachbausteine_teil2 — heaviest multi-edition variant"
    vars: { section_type: sprachbausteine_teil2, markdown_path: fixtures/sprachbausteine_teil2.txt, min_items: 2 }
  - description: "telefonnotiz — heaviest multi-edition variant (nested versions, not top-level objects)"
    vars: { section_type: telefonnotiz, markdown_path: fixtures/telefonnotiz.txt, min_items: 1 }
  - description: "hoeren_teil1 — heaviest multi-edition variant (our known-tricky case)"
    vars: { section_type: hoeren_teil1, markdown_path: fixtures/hoeren_teil1.txt, min_items: 2 }
  - description: "hoeren_teil2 — heaviest multi-edition variant"
    vars: { section_type: hoeren_teil2, markdown_path: fixtures/hoeren_teil2.txt, min_items: 2 }
  - description: "hoeren_teil3 — heaviest multi-edition variant"
    vars: { section_type: hoeren_teil3, markdown_path: fixtures/hoeren_teil3.txt, min_items: 2 }
  # This fixture contains THREE discovery chunks but only ONE real edition:
  # chunks 2/3 begin with later corrections to questions 36/38, then continue
  # the same five-message variant. The parse prompt must merge them into one
  # object; treating each <<<ITEM>>> as an edition was a false-positive gate.
  - description: "hoeren_teil4 — three correction chunks must merge into one variant"
    vars: { section_type: hoeren_teil4, markdown_path: fixtures/hoeren_teil4.txt, min_items: 1, expected_items: 1 }

  # Regression tests below use synthetic fixtures (regression_fixtures/,
  # committed to git — unlike fixtures/, they're hand-written, not
  # extracted from the real copyrighted exam PDF) reproducing the exact
  # production bug: one already-numbered question followed by a later
  # "Варианты ответов от <date>"-style answer correction. Must resolve
  # to ONE object with full content and the official question count —
  # not two objects, not a dropped/empty result.
  - description: "hoeren_teil4 — single-question answer correction must not split the variant or drop content"
    vars:
      section_type: hoeren_teil4
      markdown_path: regression_fixtures/hoeren_teil4_single_question_correction.txt
      min_items: 1
      expected_items: 1
  - description: "hoeren_teil4 — genuinely missing phone message must use the -1,-1 text sentinel"
    vars:
      section_type: hoeren_teil4
      markdown_path: regression_fixtures/hoeren_teil4_missing_text_sentinel.txt
      min_items: 1
  - description: "lesen_teil2 — synthetic span boundaries must stay inside source text"
    vars:
      section_type: lesen_teil2
      markdown_path: regression_fixtures/lesen_teil2_span_boundaries.txt
      min_items: 1
  - description: "beschwerde — single-question answer correction must not split the variant or drop content"
    vars:
      section_type: beschwerde
      markdown_path: regression_fixtures/beschwerde_single_question_correction.txt
      min_items: 1
  - description: "telefonnotiz — shared answer-key block across 2 editions must split via slash_index, not duplicate or leak raw '/'"
    vars:
      section_type: telefonnotiz
      markdown_path: regression_fixtures/telefonnotiz_shared_answer_block_slash_index.txt
      min_items: 1
    assert:
      - type: python
        value: file://assertions.py:telefonnotiz_shared_answer_block_splits_correctly
  - description: "telefonnotiz — edition with no printed Weitere Informationen bullets must report the -1,-1 sentinel"
    vars:
      section_type: telefonnotiz
      markdown_path: regression_fixtures/telefonnotiz_no_bullets_sentinel.txt
      min_items: 1
    assert:
      - type: python
        value: file://assertions.py:telefonnotiz_no_bullets_sentinel
