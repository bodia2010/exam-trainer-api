description: "Exam Trainer — parse pass, model comparison (hoeren_teil1)"

prompts:
  - file://prompt_parse.py:get_prompt

providers:
  - id: google:gemini-2.5-flash
    label: flash-2.5-current
    config:
      generationConfig:
        temperature: 1
        thinkingConfig:
          thinkingBudget: 0

  - id: google:gemini-3.1-flash-lite
    label: flash-lite-3.1-candidate
    config:
      generationConfig:
        temperature: 1
        thinkingConfig:
          thinkingLevel: MINIMAL

tests:
  - description: "hoeren_teil1 variant 3 — 6 editions in one group (our worst known under-extraction case)"
    vars:
      section_type: hoeren_teil1
      markdown: file://fixtures/hoeren_teil1_variant3.txt
      min_items: 2
    assert:
      - type: python
        value: file://assertions.py:question_pairs_exactly_three
      - type: python
        value: file://assertions.py:original_has_no_sentinel
      - type: python
        value: file://assertions.py:item_count_at_least
